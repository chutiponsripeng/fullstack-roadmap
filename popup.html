<div id="projectPopup" class="popup">

    <div class="popup-content">

        <h3 id="projectTitle"></h3>

        <p id="projectDesc"></p>

        <hr>

        <h4>Example ❓</h4>
        <pre id="projectExample"></pre>

        <hr>

        <button class="show-popup" onclick="toggleSolution()">Show Solution</button>

        <div id="solutionBox" style="display:none;">
            <h4>Solution ✅</h4>
            <pre id="projectSolution"></pre>
        </div>

        <button class="close-popup" onclick="closeProject()">Close</button>

    </div>

</div>
